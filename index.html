<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>labb1</title>
</head>

<body>
  <div id="app">
    <div id="inputs">
      <input type="text" placeholder="Kurskod" id="code">
      <input type="text" placeholder="Namn" id="name">
      <input type="text" placeholder="Progression (A, B eller C)" id="progression">
      <input type="text" value="https://"
        placeholder="https://www.miun.se/utbildning/kursplaner-och-utbildningsplaner/DT224G/" id="syllabus">
    </div>
    <div>
      <button id="add">
        <p>Lägg till</p>
      </button>
      <button id="remove">
        <p>Ta bort kurser</p>
      </button>
    </div>
    <p id="feedback">Fyll i rutorna ovan och klicka på "lägg till"</p>
    <div id="output">
      <table id="outputTable">
        <tr>
          <th>Code</th>
          <th>Name</th>
          <th>Progression</th>
          <th>Syllabus</th>
        </tr>

      </table>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
